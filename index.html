        <div class="contact-info"><div class="info-card"><i class="fas fa-envelope" style="font-size:2rem; color:#FE2C55;"></i><h3>Email Us</h3><p>hello@tiktokemojihub.com</p><p>support@tiktokemojihub.com</p></div><div class="info-card"><i class="fas fa-phone" style="font-size:2rem; color:#FE2C55;"></i><h3>Call Us</h3><p>+1 (555) 872-EMOJI</p><p>Mon-Fri 9am-6pm PST</p></div><div class="info-card"><i class="fab fa-instagram" style="font-size:2rem; color:#FE2C55;"></i><h3>Instagram</h3><p>@tiktokemojihub</p><p>DM us anytime</p></div></div>
        <div class="contact-form"><h3>📝 Send us a Message</h3><form id="contactFormPage"><input type="text" placeholder="Your Full Name" required><input type="email" placeholder="Email Address" required><input type="text" placeholder="Subject"><textarea rows="5" placeholder="Your message... (suggestions, collaborations, feedback)" required></textarea><button type="submit"><i class="fas fa-paper-plane"></i> Send Message</button></form><p style="margin-top:16px;">We respond within 24 hours on business days. Your privacy matters.</p></div>
        <div class="rich-text contact-page-text"><h3>📍 Physical Address</h3><p>123 Creator Lane, Suite 404, Los Angeles, CA 90028, USA</p><h3>🤝 Partnership & Business Inquiries</h3><p>For brand collaborations, sponsored content, or bulk PNG licensing, email partnerships@tiktokemojihub.com. We work with creators, agencies, and educational institutions worldwide.</p><h3>❓ Frequently Asked Questions</h3><p><strong>Q: How do I suggest a new emoji meaning?</strong> A: Use contact form with "Emoji Suggestion" subject.<br><strong>Q: Can I use your PNGs commercially?</strong> A: Yes, free for personal and commercial use with attribution.<br><strong>Q: Found incorrect emoji code?</strong> A: Email support@tiktokemojihub.com with details.<br><strong>Q: Do you offer API access?</strong> A: We're launching a public API soon. Contact for early beta access.</p><p>This contact page includes multiple contact methods, FAQ, partnership details, support hours, and comprehensive response guidelines. We value every message and aim to provide the best user support in the emoji space. Thank you for reaching out to TikTok Emoji Hub — where emojis come alive! 💖</p></div>`;
    };

    // Page content mapping
    const pageContent = {
        home: homeContent,
        wow: wowContent,
        happy: happyContent,
        cute: cuteContent,
        about: aboutContent,
        contact: contactContent
    };

    const pageTitles = {
        home: "TikTok Emojis Complete Guide | Copy-Paste, Codes, PNGs & Meanings",
        wow: "Wow TikTok Emoji | Complete Guide with Codes, Meanings & PNGs",
        happy: "Happy TikTok Emoji Collection | Spread Joy & Engagement",
        cute: "Cute TikTok Emoji Masterlist | Copy-Paste & Codes",
        about: "About Us | TikTok Emoji Hub - Our Mission & Team",
        contact: "Contact Us | TikTok Emoji Hub - Get in Touch"
    };

    const pageDescriptions = {
        home: "Complete TikTok emoji guide: copy-paste, codes, PNGs, meanings for Wow, Happy, Cute emojis. 3000+ words.",
        wow: "Complete Wow TikTok emoji guide: codes, meanings, PNGs, secret combos for amazing reactions. 2000+ words.",
        happy: "Complete Happy TikTok emoji guide: smileys, joy codes, meanings, PNGs for engagement. 2000+ words.",
        cute: "Complete Cute TikTok emoji masterlist: animals, hearts, pleading face, PNGs. 2000+ words.",
        about: "About TikTok Emoji Hub: mission, team, story, and values. 1000+ words.",
        contact: "Contact page: form, email, phone, FAQ, partnership details. 1000+ words."
    };

    // Navigation function with proper permalink update
    function navigateTo(pageId) {
        if (!pageContent[pageId]) return;
        
        // Update URL without reloading page
        const newUrl = PERMALINKS[pageId];
        history.pushState({ page: pageId }, "", newUrl);
        
        // Render the page
        renderPage(pageId);
    }

    function renderPage(pageId) {
        // Render content
        document.getElementById('page-render').innerHTML = pageContent[pageId]();
        
        // Update meta tags
        document.title = pageTitles[pageId];
        let metaDesc = document.querySelector('meta[name="description"]');
        if (!metaDesc) {
            metaDesc = document.createElement('meta');
            metaDesc.name = "description";
            document.head.appendChild(metaDesc);
        }
        metaDesc.content = pageDescriptions[pageId];
        
        // Update active nav class
        document.querySelectorAll('.nav-link').forEach(link => {
            link.classList.remove('active');
            if (link.getAttribute('data-nav') === pageId) {
                link.classList.add('active');
            }
        });
        
        // Attach event listeners for copy and PNG buttons
        setTimeout(() => {
            document.querySelectorAll('.copy-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const emoji = btn.getAttribute('data-emoji');
                    navigator.clipboard.writeText(emoji);
                    alert(`Copied: ${emoji}`);
                });
            });
            
            document.querySelectorAll('.png-btn').forEach(btn => {
                btn.addEventListener('click', () => alert('✨ PNG download: High-resolution transparent PNG would download here.'));
            });
            
            // Internal navigation links (inside content)
            document.querySelectorAll('.internal-nav').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const toPage = link.getAttribute('data-nav');
                    if (toPage && pageContent[toPage]) {
                        navigateTo(toPage);
                    }
                });
            });
            
            // Contact form handler
            const contactForm = document.getElementById('contactFormPage');
            if (contactForm) {
                contactForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    alert('Thank you! We will respond within 24 hours.');
                    this.reset();
                });
            }
        }, 10);
    }

    // Handle navigation clicks on menu and logo
    document.querySelectorAll('.nav-link, .logo a').forEach(link => {
        link.addEventListener('click', (e) => {
            e.preventDefault();
            const pageId = link.getAttribute('data-nav');
            if (pageId && pageContent[pageId]) {
                navigateTo(pageId);
            }
        });
    });

    // Handle browser back/forward buttons
    window.addEventListener('popstate', (event) => {
        const path = window.location.pathname;
        const pageId = PATH_TO_PAGE[path] || "home";
        renderPage(pageId);
    });

    // Initial load: check current URL path and load appropriate page
    const initialPath = window.location.pathname;
    const initialPage = PATH_TO_PAGE[initialPath] || "home";
    renderPage(initialPage);
</script>
</body>
